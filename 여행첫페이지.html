<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Plan - 랜덤 로드</title>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KAKAO_MAPS_API_KEY&libraries=services"></script>
    <style>
        /* ----------------------------------------------------
           1. 기본 스타일 및 레이아웃 설정
        ---------------------------------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 헤더 스타일 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
        }

        header .logo {
            font-size: 24px;
            font-weight: bold;
            font-style: italic;
            cursor: pointer;
        }

        header nav a {
            text-decoration: none;
            color: #555;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.3s;
        }

        header nav a:hover, header nav a.active {
            color: #000;
            text-decoration: underline;
        }

        /* 메인 콘텐츠 컨테이너 (그리드 레이아웃) */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            grid-template-rows: auto auto;
            gap: 20px;
            padding: 30px 40px;
            flex: 1;
        }

        /* 미니 페이지 공통 스타일 */
        .mini-page {
            background-color: #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        /* ----------------------------------------------------
           2. 각 번호별 미니 페이지 개별 스타일
        ---------------------------------------------------- */

        /* [1번] 카테고리 창 */
        .category-box {
            background-color: #eaeaea;
        }
        .category-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            background: #d4d4d4;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
        }
        .chip-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .category-chip {
            background-color: #c8c8c8;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .category-chip.active {
            background-color: #888888;
            color: white;
        }

        /* [2번] 지도 창 */
        .map-box {
            position: relative;
            height: 400px;
        }
        #map {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            background-color: #ccc;
        }
        /* 지도 컨트롤 & 버튼 */
        .map-controls {
            position: absolute;
            right: 30px;
            top: 30px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .map-controls button {
            width: 30px;
            height: 30px;
            background: white;
            border: 1px solid #ccc;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
        }
        .random-btn-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 10;
        }
        .btn-submit {
            background-color: #999;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background-color: #666;
        }
        /* 현재 상태 표시 라벨 */
        .status-label {
            position: absolute;
            left: 30px;
            top: 30px;
            z-index: 10;
            background: rgba(255,255,255,0.9);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #ddd;
        }

        /* [3번] 여행지 상세(사진/설명) 창 */
        .destination-box {
            min-height: 300px;
        }
        .dest-img-slot {
            width: 100%;
            height: 180px;
            background-color: #ccbaba; /* 제공해주신 붉은 톤의 플레이스홀더 반영 */
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-weight: bold;
            overflow: hidden;
        }
        .dest-img-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .dest-info-text h3 {
            margin-bottom: 8px;
            font-size: 20px;
        }
        .dest-info-text p {
            color: #555;
            line-height: 1.4;
        }

        /* [4번] AI 추천 코스 창 */
        .ai-box {
            min-height: 300px;
        }
        .ai-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .ai-content {
            background: rgba(255,255,255,0.5);
            padding: 15px;
            border-radius: 10px;
            flex: 1;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-line;
        }

        /* 서브 페이지(추천/마이페이지)용 가상 섹션 */
        .sub-page-view {
            display: none;
            padding: 40px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
    </script><script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=45bb55ed9d462b61e7cac8e8bef936ef"></script>
</head>
<body>

    <header>
        <div class="logo" onclick="showPage('main')">trip plan</div>
        <nav>
            <a href="#" id="nav-recommend" onclick="showPage('recommend')">recommend</a>
            <a href="#" id="nav-mypage" onclick="showPage('mypage')">my page</a>
        </nav>
    </header>

    <main id="main-view" class="main-container">
        
        <section class="mini-page category-box">
            <div class="category-title">Category</div>
            <div class="chip-container">
                <button class="category-chip" onclick="selectCategory('산')">산</button>
                <button class="category-chip" onclick="selectCategory('바다')">바다</button>
                <button class="category-chip" onclick="selectCategory('캠핑')">캠핑</button>
                <button class="category-chip" onclick="selectCategory('야영')">야영</button>
                <button class="category-chip" onclick="selectCategory('드라이브')">드라이브</button>
                <button class="category-chip" onclick="selectCategory('놀이동산')">놀이동산</button>
                <button class="category-chip" onclick="selectCategory('계곡')">계곡</button>
            </div>
        </section>

        <section class="mini-page map-box">
            <div class="status-label" id="status-display">선택: 전국 | 전체 카테고리</div>
            <div id="map"></div>
            
            <div class="map-controls">
                <button onclick="zoomIn()">+</button>
                <button onclick="zoomOut()">-</button>
            </div>
            
            <div class="random-btn-container">
                <button class="btn-submit" onclick="pickRandomTrip()">랜덤 여행지 선택 ✦</button>
            </div>
        </section>

        <section class="mini-page destination-box">
            <div class="dest-img-slot" id="dest-image">
                <span>여행지 사진 위치</span>
            </div>
            <div class="dest-info-text">
                <h3 id="dest-title">어디로 떠나볼까요?</h3>
                <p id="dest-desc">카테고리와 지역을 선택한 뒤 랜덤 버튼을 눌러보세요.</p>
            </div>
        </section>

        <section class="mini-page ai-box">
            <div class="ai-title">
                <span style="font-size:20px;">⚙️</span> AI 맞춤형 일정 플래너
            </div>
            <div class="ai-content" id="ai-plan-output">
                여행지가 선정되면 AI가 주변 맛집, 카페, 그리고 추가로 둘러볼 만한 코스를 이곳에 실시간으로 구성해 줍니다.
            </div>
        </section>

    </main>
    
    <div id="recommend-view" class="sub-page-view">Recommend 페이지 준비 중입니다.</div>
    <div id="mypage-view" class="sub-page-view">My Page 준비 중입니다.</div>
    <div id="map" style="width:100%; height:400px;"></div>
    <script>
        // 변수 선언부는 항상 스크립트/기능의 최상단에 배치
        let currentCategory = "";
        let currentRegion = "전국";
        let map = null;

        // 고정 데이터 구조 (실제 DB 대용 가상 데이터셋)
        const tripDatabase = [
            { name: "부산 해운대 해수욕장", region: "부산", category: "바다", desc: "시원한 바다 내음과 멋진 스카이라인을 동시에 즐길 수 있는 대한민국 대표 해변입니다.", img: "https://images.unsplash.com/photo-1570168007204-dfb528c6958f?w=500" },
            { name: "설악산 국립공원", region: "강원", category: "산", desc: "수려한 암반 지형과 사계절 내내 절경을 자랑하는 대한민국 명산입니다.", img: "https://images.unsplash.com/photo-1619546252945-9bcdb79e0815?w=500" },
            { name: "가평 자라섬 캠핑장", region: "경기", category: "캠핑", desc: "북한강 변에 위치하여 자연 속에서 평화로운 힐링 캠핑을 즐길 수 있는 최적의 장소입니다.", img: "https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=500" },
            { name: "제주도 한라산 둘레길", region: "제주", category: "야영", desc: "울창한 숲과 신비로운 제주의 자연을 온전히 느낄 수 있는 하이킹 및 백패킹 명소입니다.", img: "https://images.unsplash.com/photo-1549880338-65ddcdfd017b?w=500" },
            { name: "단양 남한강 잔도길", region: "충북", category: "드라이브", desc: "남한강 절벽을 따라 짜릿한 드라이브와 트래킹을 동시에 경험할 수 있는 코스입니다.", img: "https://images.unsplash.com/photo-1506012787146-f92b2d7d6d96?w=500" },
            { name: "용인 에버랜드", region: "경기", category: "놀이동산", desc: "스릴 넘치는 어트랙션과 화려한 퍼레이드가 가득한 국내 최대 규모의 테마파크입니다.", img: "https://images.unsplash.com/photo-1513885535751-8b9238bd345a?w=500" },
            { name: "지리산 뱀사골 계곡", region: "전북", category: "계곡", desc: "여름철 무더위를 한 번에 날려줄 만큼 맑고 차가운 청정 계곡수가 흐르는 곳입니다.", img: "https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=500" }
        ];

        // 행정구역별 카카오맵 중심 좌표 매핑 데이터
        const regionCoordinates = {
            "전국": { lat: 36.5, lng: 127.8, level: 12 },
            "서울": { lat: 37.5665, lng: 126.9780, level: 7 },
            "경기": { lat: 37.4138, lng: 127.5183, level: 9 },
            "강원": { lat: 37.7518, lng: 128.2571, level: 9 },
            "부산": { lat: 35.1796, lng: 129.0756, level: 7 },
            "제주": { lat: 33.4996, lng: 126.5312, level: 8 },
            "충북": { lat: 36.6356, lng: 127.4913, level: 9 },
            "전북": { lat: 35.8242, lng: 127.1480, level: 9 }
        };

        // 초기화 실행
        window.onload = function() {
            initMap();
        };

        // 카카오 지도 기본 설정 및 행정구역 선택 이벤트 바인딩
        function initMap() {
            const container = document.getElementById('map');
            const options = {
                center: new kakao.maps.LatLng(regionCoordinates["전국"].lat, regionCoordinates["전국"].lng),
                level: regionCoordinates["전국"].level
            };
            map = new kakao.maps.Map(container, options);

            // [핵심 기능] 행정구역을 모방한 주소-좌표 역변환 클릭 이벤트 정의
            // 가시성을 위해 단순 클릭 시 가장 가까운 주요 도시 매핑으로 임시 처리
            kakao.maps.event.addListener(map, 'click', function(mouseEvent) {
                const latlng = mouseEvent.getLatLng();
                
                // 실제 고도화 시에는 이 부분에 행정구역 다각형(Polygon) 검사 알고리즘이나 
                // 카카오 로컬 행정구역 정보 호출 API가 탑재됩니다.
                // 여기서는 좌표 범위를 이용해 간단히 지역 명칭을 가변 할당합니다.
                if (latlng.getLat() < 34.5) {
                    currentRegion = "제주";
                } else if (latlng.getLng() > 128.5 && latlng.getLat() < 36.0) {
                    currentRegion = "부산";
                } else if (latlng.getLat() > 37.2 && latlng.getLng() < 127.3) {
                    currentRegion = "서울";
                } else if (latlng.getLat() > 37.0 && latlng.getLng() >= 127.3) {
                    currentRegion = "강원";
                } else {
                    currentRegion = "경기"; // 기본값 핸들링
                }
                
                updateStatusDisplay();
            });
        }

        // 1번 영역: 카테고리 칩 선택 함수
        function selectCategory(category) {
            const chips = document.querySelectorAll('.category-chip');
            chips.forEach(chip => {
                if(chip.textContent === category) {
                    chip.classList.add('active');
                } else {
                    chip.classList.remove('active');
                }
            });
            currentCategory = category;
            updateStatusDisplay();
        }

        // 상단 정보 인디케이터 갱신
        function updateStatusDisplay() {
            const display = document.getElementById('status-display');
            display.textContent = `선택: ${currentRegion} | 카테고리: ${currentCategory || "전체"}`;
        }

        // 2번 영역: 지도 컨트롤 함수
        function zoomIn() {
            if(map) map.setLevel(map.getLevel() - 1);
        }
        function zoomOut() {
            if(map) map.setLevel(map.getLevel() + 1);
        }

        // 3번 & 4번 영역 연동: 필터 조건 기반 랜덤 뽑기 및 OpenAI 모사 호출
        function pickRandomTrip() {
            // 필터링 처리
            let filtered = tripDatabase;
            
            if (currentRegion !== "전국") {
                filtered = filtered.filter(item => item.region === currentRegion);
            }
            if (currentCategory) {
                filtered = filtered.filter(item => item.category === currentCategory);
            }

            if (filtered.length === 0) {
                alert("해당 조건에 일치하는 샘플 여행지가 없습니다. 다른 지역이나 카테고리를 선택해 주세요!");
                return;
            }

            // 배열 내 무작위 무작위 인덱스 추출
            const randomIndex = Math.floor(Math.random() * filtered.length);
            const selectedTrip = filtered[randomIndex];

            // [3번 페이지 UI 반영]
            document.getElementById('dest-image').innerHTML = `<img src="${selectedTrip.img}" alt="${selectedTrip.name}">`;
            document.getElementById('dest-title').textContent = selectedTrip.name;
            document.getElementById('dest-desc').textContent = selectedTrip.desc;

            // 지도 중심을 당첨된 지역 좌표로 부드럽게 이동 및 마커 생성
            const moveLatLon = new kakao.maps.LatLng(regionCoordinates[selectedTrip.region].lat, regionCoordinates[selectedTrip.region].lng);
            map.panTo(moveLatLon);
            map.setLevel(regionCoordinates[selectedTrip.region].level);

            const marker = new kakao.maps.Marker({
                position: moveLatLon
            });
            marker.setMap(map);

            // [4번 페이지 UI 반영] OpenAI API 통신 프로세스 호출
            callOpenAIPlanner(selectedTrip.name, selectedTrip.category);
        }

        // 지도를 담을 영역의 DOM 레퍼런스 추출
        const container = document.getElementById('map'); 

        const options = {
            center: new kakao.maps.LatLng(37.5665, 126.9780), // 지도의 중심좌표 (위의 예시는 서울시청)
            level: 3 // 지도의 확대 레벨 (숫자가 작을수록 확대됨)
        };

        // 지도 생성 및 객체 리턴

        // 4번 영역: OpenAI API 통신 함수 (서버 연동 전 가이드 프롬프트 및 응답 시뮬레이션)
        function callOpenAIPlanner(destination, category) {
            const aiOutput = document.getElementById('ai-plan-output');
            aiOutput.textContent = "🤖 AI가 주변 맛집과 숨은 볼거리를 매칭하여 당일치기 계획을 설계하고 있습니다...";

            // 실제 OpenAI API fetch 코드 구조 가이드 (Vibe 툴에 바로 붙여 적용 가능)
            /*
            const apiKey = "YOUR_OPENAI_API_KEY";
            fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: [
                        { role: "system", content: "너는 국내 테마 여행 코스 빌더야. 주어진 명소와 카테고리에 맞는 명확한 식당 명칭, 근처 카페, 추가 경로를 300자 이내로 간결히 제시해줘." },
                        { role: "user", content: `${destination} 주변으로 ${category} 테마에 어울리는 필수 맛집 코스를 한 군데 짜줘.` }
                    ]
                })
            })
            .then(res => res.json())
            .then(data => { aiOutput.textContent = data.choices[0].message.content; });
            */

            // UI 흐름 구동을 위한 비동기 타이머 연출 (Mock 데이터)
            setTimeout(() => {
                aiOutput.innerHTML = `
                    <strong>🍽추천 외식 장소:</strong> ${destination} 인근 평점 높은 현지 로컬 맛집 탐방<br>
                    <strong>☕️추천 카페 코스:</strong> SNS에서 뷰 맛집으로 소문난 테마 카페 방문<br>
                    <strong>🎡추천 사이드 투어:</strong> 해당 지역의 시그니처 야경 포인트 및 산책로 연계 동선 구축 완료!<br><br>
                    <em>*실제 OpenAI API Key 연동 시 실시간 주소 맞춤형 추천 텍스트가 바인딩됩니다.*</em>
                `;
            }, 1200);
        }

        // 헤더 탭 메뉴 클릭 시 뷰 전환 라우팅 함수
        function showPage(pageId) {
            const mainView = document.getElementById('main-view');
            const recommendView = document.getElementById('recommend-view');
            const mypageView = document.getElementById('mypage-view');
            
            const navRec = document.getElementById('nav-recommend');
            const navMy = document.getElementById('nav-mypage');

            // 초기화
            mainView.style.display = 'none';
            recommendView.style.display = 'none';
            mypageView.style.display = 'none';
            navRec.classList.remove('active');
            navMy.classList.remove('active');

            if(pageId === 'main') {
                mainView.style.display = 'grid';
                if(map) map.relayout(); // 숨겨진 레이아웃 해제 시 지도 크기 재보정 필수
            } else if(pageId === 'recommend') {
                recommendView.style.display = 'block';
                navRec.classList.add('active');
            } else if(pageId === 'mypage') {
                mypageView.style.display = 'block';
                navMy.classList.add('active');
            }
        }
    </script>
</body>
</html>
