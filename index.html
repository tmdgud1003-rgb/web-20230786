<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>나의 미니 페이지</title>

    <!-- 외부 CSS 연결 -->
    <link rel="stylesheet" href="style.css">

    <script>
        // 버튼 클릭 시 실행되는 함수
        function showMessage() {
            alert("안녕하세요! 반갑습니다.");
        }
    </script>
</head>
<body>

    <!-- 제목 -->
    <h1>노승형의 미니 페이지</h1>
    <link rel="stylesheet" href="style.css">
    <!-- 자기소개 -->
    <p>안녕하세요! 저는 컴퓨터공학과 학생입니다.</p>
    <p>유동적인 운동을 좋아하는 것 같습니다. 최근에는 요리에도 빠져 베이킹에 대해서도 관심이 생겼습니다</p>

    <!-- 이미지 -->
    <img src="image/승형사진.jpg" width="520" height="400">

    <!-- 목록 -->
    <h2>나의 취미</h2>
    <ul>
        <li>게임</li>
        <li>코딩</li>
        <li>유튜브 보기</li>
        <li>스키, 농구 등등</li>
    </ul>

    <!-- 버튼 -->
    <button onclick="showMessage()">클릭해보세요</button>

</body>
</html>
